name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run backend tests
        run: dotnet test ViatabBackend.Tests/ --verbosity normal

  test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: viatab-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./viatab-frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false --ci
        working-directory: ./viatab-frontend
        env:
          CI: true

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./ViatabBackend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/viatab-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./viatab-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/viatab-frontend:latest
