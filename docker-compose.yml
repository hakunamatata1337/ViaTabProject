version: "3.8"

services:

  db:
    image: postgres:16
    container_name: viatab-db
    environment:
      POSTGRES_DB: viatab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ViatabBackend
    container_name: viatab-backend
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=viatab;Username=postgres;Password=postgres

  frontend:
    build:
      context: ./viatab-frontend
    container_name: viatab-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
